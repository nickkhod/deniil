<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>День Народження Дені</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Bangers&family=Nunito:wght@700;900&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red:     #CC0000;
    --blue:    #0033AA;
    --blue2:   #0055DD;
    --yellow:  #FFCC00;
    --dark:    #07091A;
    --mid:     #0D1535;
    --white:   #FFFFFF;
  }

  body {
    background: var(--dark);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Nunito', sans-serif;
    padding: 20px;
    overflow-x: hidden;
  }

  /* Web/stars background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 8%  12%, rgba(255,255,255,0.55) 0%, transparent 100%),
      radial-gradient(1px 1px at 22% 55%, rgba(255,255,255,0.45) 0%, transparent 100%),
      radial-gradient(1px 1px at 38% 28%, rgba(255,255,255,0.65) 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 78%, rgba(255,255,255,0.40) 0%, transparent 100%),
      radial-gradient(1px 1px at 72% 18%, rgba(255,255,255,0.55) 0%, transparent 100%),
      radial-gradient(1px 1px at 83% 52%, rgba(255,255,255,0.50) 0%, transparent 100%),
      radial-gradient(1px 1px at 92% 88%, rgba(255,255,255,0.65) 0%, transparent 100%),
      radial-gradient(2px 2px at 48% 48%, rgba(204,0,0,0.25) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  .card {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 520px;
    border-radius: 20px;
    overflow: hidden;
    box-shadow:
      0 0 50px rgba(204,0,0,0.45),
      0 0 100px rgba(0,51,170,0.35),
      0 0 0 3px var(--blue);
    background: var(--dark);
  }

  /* ─── HERO BANNER ─── */
  .hero-banner {
    background: linear-gradient(160deg, var(--blue) 0%, #001880 45%, #5a0000 100%);
    padding: 28px 24px 22px;
    text-align: center;
    position: relative;
    border-bottom: 5px solid var(--red);
  }

  /* diagonal stripe overlay */
  .hero-banner::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      -55deg,
      transparent,
      transparent 18px,
      rgba(255,255,255,0.025) 18px,
      rgba(255,255,255,0.025) 36px
    );
    pointer-events: none;
  }

  /* dot halftone */
  .hero-banner::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px);
    background-size: 10px 10px;
    pointer-events: none;
  }

  /* Superman S-shield SVG top-left */
  .shield {
    position: absolute;
    top: 14px;
    left: 18px;
    z-index: 3;
    opacity: 0.92;
    animation: pulse 3s ease-in-out infinite;
  }
  .shield svg { width: 52px; height: 52px; }

  /* POW badge top-right */
  .pow {
    position: absolute;
    top: 12px;
    right: 16px;
    z-index: 3;
    animation: wobble 4s ease-in-out infinite;
  }
  .pow svg { width: 62px; height: 62px; }

  @keyframes pulse {
    0%,100% { transform: scale(1);   filter: drop-shadow(0 0 6px rgba(255,204,0,0.6)); }
    50%      { transform: scale(1.06); filter: drop-shadow(0 0 14px rgba(255,204,0,0.9)); }
  }
  @keyframes wobble {
    0%  { transform: rotate(-6deg) scale(1); }
    50% { transform: rotate(6deg) scale(1.05); }
    100%{ transform: rotate(-6deg) scale(1); }
  }

  /* Hero icons */
  .heroes {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin-bottom: 14px;
    position: relative;
    z-index: 2;
  }

  .hero-icon {
    width: 58px;
    height: 58px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    border: 3px solid var(--yellow);
    box-shadow: 0 0 18px rgba(255,204,0,0.45);
    animation: heroFloat 3s ease-in-out infinite;
    background: rgba(0,0,0,0.45);
  }
  .hero-icon:nth-child(2) { animation-delay: 0.4s; border-color: var(--red); box-shadow: 0 0 18px rgba(204,0,0,0.5); }
  .hero-icon:nth-child(3) { animation-delay: 0.8s; }
  .hero-icon:nth-child(4) { animation-delay: 1.2s; border-color: var(--red); box-shadow: 0 0 18px rgba(204,0,0,0.5); }

  @keyframes heroFloat {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-7px); }
  }

  /* ── CLASSIC SERIF title ── */
  .invite-label {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 12px;
    letter-spacing: 5px;
    color: var(--yellow);
    text-transform: uppercase;
    position: relative;
    z-index: 2;
    margin-bottom: 6px;
    font-weight: 900;
  }

  .name-title {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 80px;
    line-height: 0.95;
    font-weight: 900;
    font-style: italic;
    color: var(--white);
    text-shadow:
      3px 3px 0 var(--red),
      6px 6px 0 rgba(0,0,0,0.55);
    position: relative;
    z-index: 2;
    letter-spacing: 2px;
  }

  .birthday-subtitle {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 18px;
    font-weight: 900;
    color: var(--yellow);
    letter-spacing: 3px;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.6);
    position: relative;
    z-index: 2;
    margin-top: 6px;
    text-transform: uppercase;
  }

  /* ─── RED STRIPE divider ─── */
  .stripe-divider {
    height: 0;
    border: none;
    border-top: 5px solid var(--red);
    background: var(--red);
    position: relative;
  }

  /* ─── CONTENT ─── */
  .content {
    background: var(--mid);
    padding: 6px 26px 26px;
  }

  .tagline {
    text-align: center;
    font-size: 15px;
    font-weight: 900;
    color: var(--white);
    padding: 16px 0 18px;
    line-height: 1.65;
    border-bottom: 2px dashed rgba(255,204,0,0.18);
  }
  .tagline span { color: var(--yellow); }

  /* Info grid */
  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin: 18px 0;
  }

  .info-block {
    background: rgba(255,255,255,0.04);
    border: 2px solid rgba(255,204,0,0.18);
    border-radius: 14px;
    padding: 14px 12px;
    display: flex;
    align-items: center;
    gap: 11px;
    transition: border-color 0.2s, background 0.2s;
  }
  .info-block:hover {
    border-color: rgba(255,204,0,0.55);
    background: rgba(255,255,255,0.06);
  }
  .info-block.wide { grid-column: 1 / -1; }

  .info-emoji { font-size: 26px; flex-shrink: 0; }

  .info-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--yellow);
    margin-bottom: 3px;
  }

  .info-value {
    font-size: 15px;
    font-weight: 900;
    color: var(--white);
    line-height: 1.35;
  }

  /* Fun box */
  .fun-line {
    background: linear-gradient(135deg, var(--red) 0%, #990000 100%);
    border-radius: 14px;
    padding: 16px 18px;
    text-align: center;
    font-size: 14px;
    font-weight: 900;
    color: var(--white);
    line-height: 1.65;
    border: 2px solid rgba(255,255,255,0.12);
  }
  .fun-line .emoji-row {
    font-size: 22px;
    display: block;
    margin-bottom: 6px;
    letter-spacing: 4px;
  }

  /* Footer */
  .footer {
    background: linear-gradient(135deg, var(--blue) 0%, #001060 100%);
    padding: 14px;
    text-align: center;
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 15px;
    font-weight: 900;
    font-style: italic;
    letter-spacing: 3px;
    color: var(--yellow);
    border-top: 4px solid var(--yellow);
  }

  @media (max-width: 480px) {
    .name-title { font-size: 62px; }
    .hero-icon { width: 48px; height: 48px; font-size: 24px; }
    .info-grid { grid-template-columns: 1fr; }
    .info-block.wide { grid-column: auto; }
  }
</style>
</head>
<body>

<div class="card">

  <!-- Hero Banner -->
  <div class="hero-banner">

    <!-- Superman S-Shield -->
    <div class="shield">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <!-- outer diamond -->
        <polygon points="50,2 98,30 98,70 50,98 2,70 2,30" fill="#FFCC00" stroke="#CC0000" stroke-width="3"/>
        <!-- inner red -->
        <polygon points="50,10 90,33 90,67 50,90 10,67 10,33" fill="#CC0000"/>
        <!-- S letter -->
        <text x="50" y="67" text-anchor="middle" font-family="Georgia, serif" font-size="52" fill="#FFCC00" font-weight="bold" font-style="italic">S</text>
      </svg>
    </div>

    <!-- POW badge -->
    <div class="pow">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <polygon points="50,2 61,34 96,34 69,55 80,88 50,67 20,88 31,55 4,34 39,34" fill="#FFCC00" stroke="#CC0000" stroke-width="2.5"/>
        <text x="50" y="60" text-anchor="middle" font-family="Bangers, cursive" font-size="17" fill="#0033AA" font-weight="bold">POW!</text>
      </svg>
    </div>

    <div class="heroes">
      <div class="hero-icon">🦸</div>
      <div class="hero-icon">🕷️</div>
      <div class="hero-icon">⚡</div>
      <div class="hero-icon">🦇</div>
    </div>

    <div class="invite-label">— Супергеройське запрошення —</div>
    <div class="name-title">ДЕНІ</div>
    <div class="birthday-subtitle">Святкує День Народження!</div>
  </div>

  <div class="stripe-divider"></div>

  <!-- Content -->
  <div class="content">

    <div class="tagline">
      <span>🦸 Дені збирає команду</span><br>
      найсміливіших друзів!
    </div>

    <div class="info-grid">

      <div class="info-block">
        <div class="info-emoji">🗓</div>
        <div>
          <div class="info-label">Дата</div>
          <div class="info-value">28 червня<br>2026</div>
        </div>
      </div>

      <div class="info-block">
        <div class="info-emoji">🕓</div>
        <div>
          <div class="info-label">Час</div>
          <div class="info-value">16:00</div>
        </div>
      </div>

      <div class="info-block wide">
        <div class="info-emoji">📍</div>
        <div>
          <div class="info-label">Місце</div>
          <div class="info-value">EPILAND Чабани<br>Одеське шосе, 8</div>
        </div>
      </div>

    </div>

    <div class="fun-line">
      <span class="emoji-row">🎂 🎉 🦸 🎈</span>
      На тебе чекають<br>
      <strong>супергеройські пригоди, ігри</strong><br>
      та святковий торт!
    </div>

  </div>

  <div class="footer">⚡ Герої не запізнюються! ⚡</div>

</div>

</body>
</html>
