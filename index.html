<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Дені — Акварельний стиль</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,900&family=Nunito:wght@700;900&family=Caveat:wght@700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #E8DDD0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
    font-family: 'Nunito', sans-serif;
  }

  .card {
    width: 100%;
    max-width: 420px;
    background: #FBF7F0;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 12px 50px rgba(0,0,0,0.18);
    border: 3px solid #C8B8A2;
    position: relative;
  }

  /* watercolor texture top */
  .top-art {
    background: linear-gradient(180deg, #DDEAF5 0%, #EAD8D0 60%, #FBF7F0 100%);
    padding: 30px 20px 20px;
    text-align: center;
    position: relative;
    min-height: 280px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
  }

  /* city skyline watercolor */
  .skyline {
    position: absolute;
    bottom: 30px;
    left: 0; right: 0;
    opacity: 0.18;
    font-size: 80px;
    letter-spacing: -4px;
    line-height: 1;
    color: #5B7FA6;
    text-align: center;
    pointer-events: none;
  }

  /* hero character */
  .hero-char {
    font-size: 90px;
    line-height: 1;
    position: relative;
    z-index: 2;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.15));
    animation: heroFloat 3s ease-in-out infinite;
  }
  @keyframes heroFloat {
    0%,100% { transform: translateY(0) rotate(-3deg); }
    50%      { transform: translateY(-10px) rotate(3deg); }
  }

  /* stars scattered */
  .stars {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .star {
    position: absolute;
    font-size: 14px;
    opacity: 0.7;
    animation: twinkle 2s ease-in-out infinite;
  }
  @keyframes twinkle {
    0%,100% { opacity: 0.4; transform: scale(1); }
    50%      { opacity: 1;   transform: scale(1.3); }
  }

  /* wavy border */
  .wavy-border {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 30px;
    background: #FBF7F0;
    clip-path: ellipse(55% 100% at 50% 100%);
  }

  /* join label */
  .join-label {
    font-family: 'Caveat', cursive;
    font-size: 16px;
    color: #8B6E5A;
    letter-spacing: 2px;
    position: relative;
    z-index: 3;
    margin-bottom: 4px;
  }

  /* SUPER title */
  .super-title {
    font-family: 'Playfair Display', serif;
    font-size: 52px;
    font-weight: 900;
    line-height: 1;
    position: relative;
    z-index: 3;
  }
  .super-title .s { color: #C0392B; }
  .super-title .u { color: #2471A3; }
  .super-title .p { color: #C0392B; }
  .super-title .e { color: #2471A3; }
  .super-title .r { color: #C0392B; }

  /* name line */
  .name-line {
    font-family: 'Caveat', cursive;
    font-size: 32px;
    color: #5B7FA6;
    position: relative;
    z-index: 3;
    margin-top: 4px;
    border-bottom: 2px dashed #C8B8A2;
    padding-bottom: 2px;
    min-width: 160px;
    text-align: center;
  }

  /* content */
  .content {
    padding: 20px 24px 28px;
    background: #FBF7F0;
  }

  .party-label {
    font-family: 'Caveat', cursive;
    font-size: 15px;
    color: #8B6E5A;
    letter-spacing: 3px;
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .party-label::before,
  .party-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: #C8B8A2;
  }

  .info-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px dashed #DDD0C0;
  }
  .info-row:last-child { border-bottom: none; }

  .info-icon {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    border: 2px solid #C8B8A2;
    background: #FFF;
  }

  .info-text-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #B0906A;
    margin-bottom: 2px;
  }

  .info-text-value {
    font-size: 15px;
    font-weight: 900;
    color: #3A3030;
    line-height: 1.3;
  }

  .bottom-note {
    margin-top: 18px;
    background: linear-gradient(135deg, #EAD8D0, #DDEAF5);
    border-radius: 14px;
    padding: 14px 16px;
    text-align: center;
    font-family: 'Caveat', cursive;
    font-size: 17px;
    color: #5B4A40;
    line-height: 1.6;
    border: 1.5px dashed #C8B8A2;
  }
</style>
</head>
<body>
<div class="card">
  <div class="top-art">
    <div class="stars">
      <div class="star" style="top:10%;left:12%;animation-delay:0s">⭐</div>
      <div class="star" style="top:20%;right:15%;animation-delay:0.5s">✦</div>
      <div class="star" style="top:35%;left:8%;animation-delay:1s">★</div>
      <div class="star" style="top:15%;left:50%;animation-delay:0.3s">⭐</div>
      <div class="star" style="top:40%;right:10%;animation-delay:0.8s">✦</div>
      <div class="star" style="top:60%;left:20%;animation-delay:1.2s">★</div>
      <div class="star" style="top:55%;right:22%;animation-delay:0.6s">⭐</div>
    </div>
    <div class="skyline">🏙🏙🏙🏙🏙</div>
    <div class="hero-char">🦸‍♂️</div>
    <div class="wavy-border"></div>
    <div style="position:relative;z-index:3;text-align:center;padding-bottom:14px">
      <div class="join-label">✦ Запрошуємо відсвяткувати ✦</div>
      <div class="super-title">
        <span class="s">С</span><span class="u">У</span><span class="p">П</span><span class="e">Е</span><span class="r">Р</span>
      </div>
      <div class="name-line">Дені</div>
    </div>
  </div>

  <div class="content">
    <div class="party-label">🎉 Деталі свята 🎉</div>

    <div class="info-row">
      <div class="info-icon">🗓</div>
      <div>
        <div class="info-text-label">Дата</div>
        <div class="info-text-value">28 червня 2026 року</div>
      </div>
    </div>

    <div class="info-row">
      <div class="info-icon">🕓</div>
      <div>
        <div class="info-text-label">Час</div>
        <div class="info-text-value">16:00</div>
      </div>
    </div>

    <div class="info-row">
      <div class="info-icon">📍</div>
      <div>
        <div class="info-text-label">Місце</div>
        <div class="info-text-value">EPILAND Чабани<br>Одеське шосе, 8</div>
      </div>
    </div>

    <div class="bottom-note">
      🎂 На тебе чекають супергеройські пригоди, ігри та святковий торт! 🎈
    </div>
  </div>
</div>
</body>
</html>
